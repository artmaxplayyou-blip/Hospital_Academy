<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Academy — Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Стили полностью совпадают с предыдущими (полноэкранная версия) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            height: 100vh;
            background: #0b0b0f;
            display: block;
        }
        .home-card {
            width: 100%;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .home-card::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, rgba(155, 89, 182, 0.25), transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .home-card::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.4), transparent 70%);
            bottom: 20px;
            left: -60px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #9b59b6;
            position: relative;
            z-index: 5;
            flex-shrink: 0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 32px;
            color: #9b59b6;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .logo-text {
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #2c3e50 0%, #9b59b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links a {
            background: transparent;
            border: 2px solid transparent;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 60px;
            color: #1e1e2f;
            text-decoration: none;
            transition: 0.25s ease;
            display: inline-block;
        }
        .nav-links a.active {
            background: #9b59b6;
            color: white;
            box-shadow: 0 8px 18px -6px #9b59b6;
        }
        .nav-links a:not(.active):hover {
            border-color: #9b59b6;
            color: #9b59b6;
        }
        .home-hero {
            flex: 1;
            background: linear-gradient( rgba(10, 10, 20, 0.4), rgba(40, 20, 50, 0.5) ), url('background.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }
        .home-hero {
            background: linear-gradient(145deg, #1e1a2f, #2a1e3a), url('background.jpg') center/cover no-repeat;
            background-blend-mode: overlay;
        }
        .home-title {
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 0 4px 20px #9b59b6, 0 0 10px black;
            margin-bottom: 24px;
            line-height: 1.2;
            max-width: 900px;
        }
        .home-sub {
            font-size: 2rem;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 16px 40px;
            border-radius: 60px;
            border-left: 8px solid white;
            border-right: 8px solid #9b59b6;
            box-shadow: 0 20px 30px -10px black;
            margin-bottom: 40px;
        }
        .cta-button {
            background: white;
            border: none;
            padding: 18px 50px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #6c3483, 0 14px 28px rgba(0,0,0,0.3);
            border: 2px solid #9b59b6;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .cta-button i {
            color: #9b59b6;
            font-size: 1.8rem;
        }
        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #6c3483, 0 18px 32px black;
        }
        .dot-pattern {
            position: absolute;
            bottom: 20px;
            right: 30px;
            opacity: 0.2;
            font-size: 30px;
            color: #9b59b6;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="home-card">
        <div class="dot-pattern"><i class="fas fa-plus"></i> <i class="fas fa-circle"></i> <i class="fas fa-plus"></i></div>

        <div class="header">
            <div class="logo-area">
                <i class="fas fa-hospital-user logo-icon"></i>
                <span class="logo-text">HOSPITAL ACADEMY</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active"><i class="fas fa-home"></i> Главная</a>
                <a href="report.html"><i class="fas fa-file-medical-alt"></i> Набор</a>
                <a href="exam-report.html"><i class="fas fa-graduation-cap"></i> Экзамены</a>
                <a href="weekly-report.html"><i class="fas fa-graduation-cap"></i> Еженедельный отчёт </a>
            </div>
        </div>

        <div class="home-hero">
            <h1 class="home-title">Добро пожаловать в <br> Hospital Academy</h1>
            <div class="home-sub">
                <i class="fas fa-paper-plane" style="margin-right: 15px;"></i> Отправьте ваш отчёт быстро и удобно
            </div>
            <a href="report.html" class="cta-button">
                <i class="fas fa-chevron-circle-right"></i> Создать отчёт
            </a>
            <div style="position: absolute; bottom: 20px; left: 20px; color: white; opacity: 0.2; font-size: 3rem;">
                <i class="fas fa-stethoscope"></i>
            </div>
        </div>
    </div>
</body>
</html>
